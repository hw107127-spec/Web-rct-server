<!DOCTYPE html>
<html>
<head>
  <title>My Game Server</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    input, button { padding: 10px; font-size: 16px; margin: 5px; }
    #status { margin-top: 20px; font-weight: bold; color: green; }
  </style>
</head>
<body>
  
  <h2>Multiplayer Server Test</h2>
  <div id="roomIDContainer">
    <input id="roomID" value="test-room-1">
    <button onclick="press();">Test Server Connection</button>
  </div>
  
  <div id="status">Waiting for you to click...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var socket = io();
    
    function press() {
      var roomID = document.getElementById('roomID').value;
      if (roomID == "") {
        alert('Please enter a room name');
      } else {
        document.getElementById('status').innerText = "Connecting to server...";
        document.getElementById('status').style.color = "orange";
        
        // This talks to the 'join' function in app.js
        socket.emit('join', roomID, function(socketIds) {
          console.log("Joined room. Other players here:", socketIds);
          document.getElementById('status').innerText = "Success! You connected to: " + roomID;
          document.getElementById('status').style.color = "green";
        });
      }
    }
  </script>
</body>
</html>
